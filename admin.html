<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления | Вход</title>
    <link rel="icon" type="image/png" href="logo/logo-telegram.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --sage: #4A5D4E; --sand: #F5F5F0; --graphite: #2D2D2D; }
        body { font-family: 'Inter', sans-serif; background-color: var(--sand); color: var(--graphite); }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sage: '#4A5D4E', sand: '#F5F5F0', graphite: '#2D2D2D' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login View -->
    <div id="login-view" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transition-all duration-500">
        <img src="logo/logo.png" alt="Logo" class="w-32 h-auto mx-auto mb-6">
        <h1 class="text-3xl font-serif mb-6 text-center text-sage">Админ-панель</h1>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-700">Логин</label>
                <input type="text" id="login" name="login" required placeholder="Ваш логин" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-sage outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-700">Пароль</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-sage outline-none transition">
            </div>
            <button type="submit" id="login-btn" class="w-full bg-graphite text-white py-4 rounded-xl font-medium hover:opacity-90 transition transform active:scale-95">
                Войти в систему
            </button>
            <p id="error-msg" class="text-red-500 text-sm hidden text-center mt-4"></p>
        </form>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="hidden w-full max-w-7xl space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-end md:items-center gap-4">
            <div class="flex items-center gap-6">
                <img src="logo/logo.png" alt="Logo" class="w-20 h-auto">
                <h1 class="text-4xl font-serif text-sage">Заявки с сайта</h1>
            </div>
            <div class="flex items-center gap-4">
                <select id="status-filter" class="px-4 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-sage outline-none bg-white">
                    <option value="all">Все статусы</option>
                    <option value="Новый">Новые</option>
                    <option value="В работе">В работе</option>
                    <option value="Завершено">Завершенные</option>
                </select>
                <button id="logout-btn" class="text-sm font-medium text-gray-400 hover:text-red-500 transition uppercase tracking-widest">Выйти</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <!-- Analytics Column -->
            <div class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-xl border border-gray-100 space-y-10">
                <div>
                    <h3 class="text-lg font-serif mb-4 text-sage border-b border-gray-50 pb-2">Аналитика дохода</h3>
                    <canvas id="incomeChart" height="200"></canvas>
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-2">
                        <h3 class="text-lg font-serif text-sage font-medium">Календарь заявок</h3>
                        <span id="calendar-month" class="text-[10px] font-bold uppercase tracking-widest text-gray-400"></span>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center text-[10px]"></div>
                </div>
            </div>

            <!-- Leads Management Column -->
            <div class="lg:col-span-8 bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <div class="p-6 border-b border-gray-50">
                    <h3 class="text-lg font-serif text-sage">Список активных заявок</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50/50 border-b">
                            <tr>
                                <th class="px-8 py-5 text-xs uppercase tracking-widest font-semibold text-gray-400">Дата</th>
                                <th class="px-8 py-5 text-xs uppercase tracking-widest font-semibold text-gray-400">Клиент</th>
                                <th class="px-8 py-5 text-xs uppercase tracking-widest font-semibold text-gray-400">Телефон</th>
                                <th class="px-8 py-5 text-xs uppercase tracking-widest font-semibold text-gray-400">Статус</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table" class="divide-y divide-gray-50">
                            <!-- Leads will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const leadsTable = document.getElementById('leads-table');
        const statusFilter = document.getElementById('status-filter');
        const calendarGrid = document.getElementById('calendar-grid');
        const calendarMonth = document.getElementById('calendar-month');

        let client;
        let incomeChart = null;

        // Проверка сессии при загрузке
        async function init() {
            try {
                // Подтягиваем конфиг из секретов через API
                const configRes = await fetch('/api/config');
                const config = await configRes.json();
                
                client = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

                // Навешиваем событие сразу, чтобы оно работало и после логина
                statusFilter.addEventListener('change', () => {
                    renderDashboard(statusFilter.value);
                });
            } catch (err) {
                console.error("Ошибка загрузки конфигурации:", err);
                return;
            }

            const { data: { session } } = await client.auth.getSession();
            if (session) renderDashboard();
        }

        async function renderDashboard(filterValue = 'all') {
            loginView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            
            let query = client
                .from('leads_web')
                .select('*')
                .order('created_at', { ascending: false });

            // Если фильтр на "Новые", учитываем и старый технический статус 'new'
            if (filterValue === 'Новый') {
                query = query.or('status.eq.Новый,status.eq.new');
            } else if (filterValue !== 'all') {
                query = query.eq('status', filterValue);
            }

            const { data, error } = await query;

            if (error) return console.error('Error fetching leads:', error);

            renderGraph(data);
            renderCalendar(data);

            leadsTable.innerHTML = data.map(lead => `
                <tr class="hover:bg-sand/30 transition-colors">
                    <td class="px-8 py-6 text-xs text-gray-400 font-light">
                        ${new Date(lead.created_at).toLocaleDateString('ru-RU')}
                    </td>
                    <td class="px-8 py-6 font-medium text-graphite">${lead.name}</td>
                    <td class="px-8 py-6 text-gray-600">${lead.phone}</td>
                    <td class="px-8 py-6">
                        <select onchange="updateLeadStatus('${lead.id}', this.value)" class="bg-sage/10 text-sage text-[10px] uppercase font-bold rounded-full px-3 py-1 border-none focus:ring-2 focus:ring-sage cursor-pointer outline-none appearance-none">
                            <option value="Новый" ${lead.status === 'Новый' || lead.status === 'new' || !lead.status ? 'selected' : ''}>Новый</option>
                            <option value="В работе" ${lead.status === 'В работе' ? 'selected' : ''}>В работе</option>
                            <option value="Завершено" ${lead.status === 'Завершено' ? 'selected' : ''}>Завершено</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        function renderGraph(data) {
            const ctx = document.getElementById('incomeChart').getContext('2d');
            
            // Группируем доход (условно 5000 за статус "Завершено") по датам
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            }).reverse();

            const incomeStats = last7Days.map(date => {
                return data
                    .filter(l => l.status === 'Завершено' && l.created_at.startsWith(date))
                    .length * 5000; // Примерная стоимость сессии
            });

            if (incomeChart) incomeChart.destroy();
            
            incomeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days.map(d => new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })),
                    datasets: [{
                        label: 'Условный доход (₽)',
                        data: incomeStats,
                        borderColor: '#4A5D4E',
                        backgroundColor: 'rgba(74, 93, 78, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderCalendar(data) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            calendarMonth.innerText = now.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'].map(d => `<div class="font-bold text-gray-300 mb-2">${d}</div>`).join('');
            
            // Смещение для начала недели (пн)
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            
            for (let i = 0; i < offset; i++) html += '<div></div>';
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const leadsThisDay = data.filter(l => l.created_at.startsWith(dateStr));
                
                const hasLeads = leadsThisDay.length > 0;
                const isToday = day === now.getDate();
                
                html += `
                    <div class="relative group py-2 rounded-lg transition cursor-pointer 
                        ${hasLeads ? 'bg-sage/10 text-sage font-bold' : 'text-gray-400 hover:bg-gray-100'} 
                        ${isToday ? 'border border-sage' : ''}"
                        onclick="${hasLeads ? `alert('Заявки на ${day} число: \\n${leadsThisDay.map(l => '- ' + l.name).join('\\n')}')` : ''}">
                        ${day}
                        ${hasLeads ? `<span class="absolute top-1 right-1 w-1 h-1 bg-sage rounded-full"></span>` : ''}
                        
                        <!-- Tooltip on hover -->
                        ${hasLeads ? `
                        <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block z-50 bg-graphite text-white text-[10px] p-2 rounded shadow-xl whitespace-nowrap">
                            Лидов: ${leadsThisDay.length}
                        </div>
                        ` : ''}
                    </div>
                `;
            }
            
            calendarGrid.innerHTML = html;
        }

        window.updateLeadStatus = async (id, newStatus) => {
            const { error } = await client
                .from('leads_web')
                .update({ status: newStatus })
                .eq('id', id);
            
            if (error) {
                alert('Ошибка обновления статуса: ' + error.message);
            }
            // Всегда обновляем, чтобы UI соответствовал фильтру
            renderDashboard(statusFilter.value);
        };

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerText = 'Проверка...';

            // Автоматически добавляем домен к логину для работы с Supabase Auth
            const identifier = loginForm.login.value.includes('@') ? loginForm.login.value : `${loginForm.login.value}@admin.local`;
            
            const { error } = await client.auth.signInWithPassword({
                email: identifier,
                password: loginForm.password.value
            });

            if (error) {
                errorMsg.innerText = 'Доступ запрещен: ' + error.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Войти в систему';
            } else {
                renderDashboard();
            }
        };

        document.getElementById('logout-btn').onclick = async () => {
            await client.auth.signOut();
            location.reload();
        };

        init();
    </script>
</body>
</html>
